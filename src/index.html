<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAMFAST</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --accent: #fff;
      --muted: #555;
      --hover: #1e1e1e;
      --active: #2a2a2a;
      --red: #e03;
      --green: #0c6;
      --border-hover: #444;
      --border-focus: #666;
      --border-dark: #333;
    }

    :root.light-theme {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #d0d0d0;
      --accent: #111111;
      --muted: #666666;
      --hover: #ececec;
      --active: #e0e0e0;
      --red: #e03;
      --green: #0c6;
      --border-hover: #a0a0a0;
      --border-focus: #888888;
      --border-dark: #b0b0b0;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--accent);
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }

    /* ── Titlebar ── */
    #titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 32px;
      padding: 0 10px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }

    #titlebar .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      opacity: 0.9;
      text-transform: uppercase;
    }

    #titlebar .win-controls {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .win-btn {
      width: 32px;
      height: 24px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .win-btn:hover { background: var(--hover); color: var(--accent); }
    .win-btn svg { width: 14px; height: 14px; }
    #btn-close:hover { background: #c00 !important; color: #fff !important; }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      height: 34px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .tab:hover { color: var(--accent); background: var(--hover); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab svg { width: 14px; height: 14px; }

    /* ── Panels ── */
    .panel { display: none; padding: 15px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    .panel.active { display: flex; flex-direction: column; gap: 8px; animation: fadeIn 0.2s ease-out; }

    /* ── Screenshot Panel ── */
    .shot-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .action-btn {
      flex: 1;
      height: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.15s;
    }

    .action-btn:hover {
      background: var(--hover);
      border-color: var(--border-hover);
      color: var(--accent);
    }

    .action-btn:active { background: var(--active); transform: scale(0.97); }
    .action-btn svg { width: 16px; height: 16px; margin-bottom: 2px; }

    /* ── Status bar ── */
    #status {
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      padding: 2px 0;
    }

    #status.ok { color: var(--green); }
    #status.err { color: var(--red); }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }

    /* ── Quick Toggles (Record Panel) ── */
    .quick-toggle {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .quick-toggle:hover { background: var(--hover); color: var(--accent); }
    .quick-toggle.active { color: var(--accent); background: var(--active); border-color: var(--border); }
    .quick-toggle svg { width: 14px; height: 14px; }

    .mode-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      height: 32px; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
    }
    .mode-btn svg { width: 14px; height: 14px; }
    .mode-btn:hover { background: var(--hover); color: var(--accent); border-color: var(--border-hover); }
    .mode-btn:has(input:checked) { background: var(--active); color: var(--accent); border-color: var(--muted); }
    .mode-btn:active { transform: scale(0.97); }
    .mode-btn input { display: none; }

    /* ── Record Panel ── */
    .rec-controls {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .rec-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .rec-btn:hover { background: var(--hover); color: var(--accent); border-color: var(--border-hover); }
    .rec-btn:active { background: var(--active); transform: scale(0.95); }
    .rec-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .rec-btn svg { width: 16px; height: 16px; }

    #btn-start-rec { border-color: var(--border-dark); }
    #btn-start-rec:hover { border-color: #0c6; color: #0c6; }

    #btn-stop-rec:hover { border-color: #e03; color: #e03; }

    .rec-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .rec-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }

    .rec-dot.recording {
      background: var(--red);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .timer {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-family: 'Courier New', monospace;
    }

    /* ── Settings Panel ── */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .setting-group label {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    .setting-group select {
      width: 100%;
      padding: 4px 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--accent);
      font-size: 10px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    .setting-group select:hover { border-color: var(--border-hover); }
    .setting-group select:focus { border-color: var(--border-focus); }
    .setting-group input[type="text"] { width: 100%; padding: 4px 6px; background: var(--hover); border: 1px solid var(--border); border-radius: 5px; color: var(--accent); font-size: 10px; cursor: pointer; outline: none; text-align: center; transition: border-color 0.2s; }
    .setting-group input[type="text"]:focus { border-color: var(--accent); }

    /* ── Custom Inputs (Checkbox/Radio) ── */
    input[type="checkbox"], input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }
    input[type="radio"] { border-radius: 50%; }
    input[type="checkbox"]:checked, input[type="radio"]:checked {
      background: var(--accent); border-color: var(--accent);
    }
    input[type="checkbox"]:checked::after {
      content: ""; width: 3px; height: 7px;
      border: solid var(--bg); border-width: 0 2px 2px 0;
      transform: rotate(45deg); margin-bottom: 2px;
    }
    input[type="radio"]:checked::after {
      content: ""; width: 6px; height: 6px;
      border-radius: 50%; background: var(--bg);
    }
    
    /* ── Range Slider ── */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      margin: 8px 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 14px; width: 14px;
      border-radius: 50%; background: var(--accent);
      cursor: pointer; margin-top: -5px;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%; height: 4px;
      cursor: pointer; background: var(--border);
      border-radius: 2px;
    }

    /* ── Maximized Mode ── */
    body.maximized #app-wrapper { display: flex; flex-direction: column; height: 100vh; }
    body.maximized .panel.active { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    body.maximized #step-actions { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    body.maximized #preview-scroll-wrapper { max-height: none !important; flex: 1; }
    body.maximized #editor-toolbar { max-height: none !important; }

  </style>
</head>
<body>

<div id="app-wrapper">

  <!-- Titlebar -->
  <div id="titlebar">
    <span class="logo">CAMFAST</span>
    <div class="win-controls">
      <button class="win-btn" id="btn-min" title="Minimize">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>
      <button class="win-btn" id="btn-max" title="Maximize/Restore">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
      </button>
      <button class="win-btn" id="btn-close" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <div class="tab active" data-tab="screenshot">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/></svg>
      Shot
    </div>
    <div class="tab" data-tab="record">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
      Rec
    </div>
    <div class="tab" data-tab="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      Set
    </div>
  </div>

  <!-- Screenshot Panel -->
  <div class="panel active" id="panel-screenshot">
    <!-- Step 1: Capture options -->
    <div class="shot-btns" id="step-capture">
      <button class="action-btn" id="btn-capture-full">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        Full Screen
      </button>
      <button class="action-btn" id="btn-capture-crop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"></path><path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"></path></svg>
        Crop Area
      </button>
    </div>
    
    <!-- Step 2: Actions (hidden by default) -->
    <div id="step-actions" style="display: none; flex-direction: column; gap: 8px;">
      <div id="editor-properties" style="display: none; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; background: var(--surface); padding: 6px; border: 1px solid var(--border); border-radius: 6px; min-height: 38px; width: fit-content; align-self: center;"></div>
      <div style="display: flex; flex: 1; gap: 8px; overflow: hidden;">
        <div id="editor-toolbar" style="display: none; flex-direction: column; gap: 6px; background: var(--surface); padding: 6px; border: 1px solid var(--border); border-radius: 6px; overflow-y: auto; width: fit-content; align-items: center;"></div>
        <div id="preview-scroll-wrapper" style="overflow: auto; flex: 1; max-height: 200px; border: 1px solid var(--border); border-radius: 6px; background: #000; position: relative;">
          <div id="preview-container" style="display: flex; justify-content: center; align-items: center; min-height: 130px; min-width: 100%; width: max-content; position: relative;">
            <img id="shot-preview" src="" style="max-width: 100%; height: 130px; object-fit: contain; display: block;" />
          </div>
        </div>
      </div>
      <div class="shot-btns">
        <button class="action-btn" id="btn-action-save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Save
        </button>
        <button class="action-btn" id="btn-action-copy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          Copy
        </button>
        <button class="action-btn" id="btn-action-discard" style="color: var(--red);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
          Discard
        </button>
      </div>
    </div>
    <div id="status">Ready</div>
  </div>

  <!-- Record Panel -->
  <div class="panel" id="panel-record">
    <!-- Quick Toggles Toolbar -->
    <div style="display:flex; justify-content:center; align-items:center; gap: 8px; margin-bottom: 12px; padding: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;">
      <button class="quick-toggle" id="tgl-sys" title="Record System Audio"></button>
      <button class="quick-toggle" id="tgl-mic" title="Record Microphone"></button>
      <button class="quick-toggle" id="tgl-webcam" title="Toggle Webcam">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
      </button>
      <div style="width: 1px; height: 20px; background: var(--border); margin: 0 4px;"></div>
      <button class="quick-toggle" id="tgl-delay" title="3s Countdown">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
      </button>
      <button class="quick-toggle" id="tgl-hide" title="Hide Window on Start"></button>
      <button class="quick-toggle" id="tgl-stealth" title="Stealth Mode (Invisible in Video)"></button>
    </div>

    <div style="display:flex; gap: 8px; margin-bottom: 12px;">
      <label class="mode-btn">
        <input type="radio" name="rec-mode" value="full" checked>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        Full Screen
      </label>
      <label class="mode-btn">
        <input type="radio" name="rec-mode" value="crop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"></path><path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"></path></svg>
        Crop Area
      </label>
    </div>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 5px;">
      <div class="rec-indicator">
        <div class="rec-dot" id="rec-dot"></div>
        <span id="rec-status-text">Idle</span>
      </div>
      <div class="timer" id="rec-timer">00:00</div>
    </div>
    <div class="rec-controls">
      <button class="rec-btn" id="btn-start-rec" title="Start Recording">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <button class="rec-btn" id="btn-pause-rec" title="Pause / Resume" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="rec-btn" id="btn-stop-rec" title="Stop Recording" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      </button>
    </div>
    <div id="rec-status" style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;"></div>

  </div>

  <!-- Settings Panel -->
  <div class="panel" id="panel-settings">
    <div class="settings-grid">

      <div style="grid-column: 1 / -1; border-bottom: 1px solid var(--border); padding-bottom: 2px; font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase;">General</div>

      <div class="setting-group">
        <label>Theme</label>
        <select id="sel-theme">
          <option value="system" selected>System</option>
          <option value="dark">Dark Mode</option>
          <option value="light">Light Mode</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Language</label>
        <select id="sel-language">
          <option value="en" selected>English</option>
        </select>
      </div>

      <div style="grid-column: 1 / -1; border-bottom: 1px solid var(--border); padding-bottom: 2px; font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase;">Recording</div>

      <div style="grid-column: 1 / -1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;">
        <div class="setting-group">
          <label>Quality</label>
          <select id="sel-quality">
            <option value="720">720p</option>
            <option value="1080" selected>1080p</option>
            <option value="2160">4K</option>
          </select>
        </div>
        <div class="setting-group">
          <label>FPS</label>
          <select id="sel-fps">
            <option value="24">24</option>
            <option value="30" selected>30</option>
            <option value="60">60</option>
            <option value="120">120</option>
          </select>
        </div>
        <div class="setting-group">
          <label>Format</label>
          <select id="sel-format">
            <option value="webm">WebM</option>
            <option value="mp4" selected>MP4</option>
            <option value="avi">AVI</option>
            <option value="gif">GIF</option>
          </select>
        </div>
        <div class="setting-group">
          <label>Speed</label>
          <select id="sel-speed">
            <option value="0.25">0.25x</option>
            <option value="0.5">0.5x</option>
            <option value="1" selected>1.0x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2.0x</option>
          </select>
        </div>
      </div>

      <div class="setting-group">
        <label>Microphone</label>
        <select id="sel-mic">
          <option value="default">Default</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Webcam</label>
        <select id="sel-webcam">
          <option value="default">Default</option>
        </select>
      </div>
      <div class="setting-group" style="grid-column: 1 / -1;">
        <label style="display:flex; justify-content:space-between;">
          <span>Voice Pitch</span>
          <span id="pitch-val" style="color:var(--accent);">50%</span>
        </label>
        <input type="range" id="sel-pitch" min="0" max="100" value="50">
      </div>
      <div style="grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;">
        <div class="setting-group">
          <label>Start</label>
          <input type="text" class="hk-input" id="hk-start" readonly placeholder="Keys">
        </div>
        <div class="setting-group">
          <label>Pause</label>
          <input type="text" class="hk-input" id="hk-pause" readonly placeholder="Keys">
        </div>
        <div class="setting-group">
          <label>Stop</label>
          <input type="text" class="hk-input" id="hk-stop" readonly placeholder="Keys">
        </div>
      </div>

      <div class="setting-group" id="row-save-path" style="grid-column: 1 / -1; display: flex; align-items: flex-end; gap: 8px;">
        <div style="flex: 1;">
          <label>Save Folder</label>
          <input type="text" id="auto-save-path" readonly placeholder="Choose folder...">
        </div>
        <button id="btn-browse-path" style="height: 21px; padding: 0 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; color: var(--accent); font-size: 10px; cursor: pointer;">Browse</button>
      </div>

      <div class="setting-group" style="grid-column: 1 / -1; display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="chk-auto-save">
        <label style="margin: 0; cursor: pointer; color: var(--accent);" for="chk-auto-save">Auto-save without asking</label>
      </div>

      <div style="grid-column: 1 / -1; border-bottom: 1px solid var(--border); margin-top: 5px; padding-bottom: 2px; font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase;">Screenshot</div>
      
      <div style="grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;">
        <div class="setting-group">
          <label>Format</label>
          <select id="sel-shot-format">
            <option value="png" selected>PNG</option>
            <option value="jpg">JPG</option>
          </select>
        </div>
        <div class="setting-group">
          <label>Full Screen</label>
          <input type="text" class="hk-input" id="hk-full" readonly placeholder="Keys">
        </div>
        <div class="setting-group">
          <label>Crop Area</label>
          <input type="text" class="hk-input" id="hk-crop" readonly placeholder="Keys">
        </div>
      </div>

      <div class="setting-group" style="grid-column: 1 / -1; display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="chk-sound-effect" checked>
        <label style="margin: 0; cursor: pointer; color: var(--accent);" for="chk-sound-effect">Play sound</label>
      </div>

      <div style="grid-column: 1 / -1; margin-top: 10px; display: flex; justify-content: center;">
        <button id="btn-reset-settings" style="height: 28px; padding: 0 15px; background: var(--surface); border: 1px solid var(--red); border-radius: 5px; color: var(--red); font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: all 0.2s;" onmouseover="this.style.background='var(--red)'; this.style.color='#fff'" onmouseout="this.style.background='var(--surface)'; this.style.color='var(--red)'">Reset Default Settings</button>
      </div>
    </div>
  </div>
  
  <!-- Donation Banner -->
  <div id="donation-banner" style="padding: 8px 15px; background: var(--surface); border-top: 1px solid var(--border); font-size: 10.5px; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; -webkit-app-region: no-drag;">
    <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
      <span>This app is free. Support me to keep creating more tools</span>
      <a href="#" id="paypal-link" style="color: #0079C1; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 4px; transition: opacity 0.15s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1" title="Donate via PayPal">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.134 22h-4.8c-.37 0-.65-.33-.58-.69l3.15-18.62c.07-.37.38-.64.76-.64h7.93c2.7 0 4.96.44 6.28 1.96 1.15 1.34 1.52 3.2 1.1 5.5-.66 3.61-2.54 6.11-5.58 7.46-1.48.66-3.18.93-5.04.93h-1.39c-.37 0-.67.28-.73.65l-1.1 6.45z" fill="#003087"/><path d="M11.604 15.31h-1.39c-.37 0-.67.28-.73.65l-1.1 6.45c-.06.35.21.68.58.68h4.8c.37 0 .65-.33.58-.69l-.16-.92c-.06-.35.21-.68.58-.68h.83c2.61 0 4.67-.84 5.5-3.32.32-1.04.41-2.1.25-3.15-1.55 2.12-3.9 3.01-6.72 3.01h-3.02z" fill="#0079C1"/><path d="M20.254 8.65c-.41-2.31-1.87-3.69-4.33-4.21-1-.21-2.19-.24-3.4-.24h-4.66c-.37 0-.68.28-.75.64l-2.02 11.9c-.03.18.11.35.3.35h3.04c.37 0 .68-.28.75-.64l.87-5.11c.06-.37.38-.64.75-.64h2.21c2.86 0 5.25-1.02 6.12-4.04.05-.2.09-.4.12-.61z" fill="#009CDE"/></svg>
        PayPal
      </a>
    </div>
    <div style="opacity: 0.85; display: flex; align-items: center; justify-content: center; gap: 8px;">
      <span>Don’t forget: more free tools and tutorials on my</span>
      <a href="#" id="github-link" style="color: var(--accent); text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 4px; transition: opacity 0.15s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1" title="Visit GitHub">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </a>
    </div>
  </div>

</div>

  <div id="countdown-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 10, 0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; font-size: 72px; font-weight: bold; color: var(--accent); -webkit-app-region: drag;">
    <div id="countdown-text">3</div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
